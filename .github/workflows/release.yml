name: Release

on:
  push:
    tags: ['v*']
  # Allow manual re-run against an existing tag to retro-add a new
  # platform asset without cutting a new release.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag to (re)build release for (e.g., v0.1.1)'
        required: false
        default: ''

permissions:
  contents: write  # softprops/action-gh-release needs write to create / modify the Release

jobs:
  build-linux:
    name: Build Linux release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libudev-dev

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: Build
        run: |
          qmake CONFIG+=release FreeJoyQt.pro
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          # qmake's SUBDIRS template Release build lands at src/release/.
          cp src/release/FreeJoyXConfiguratorQt dist/
          tar -czf FreeJoyXConfiguratorQt-linux-${{ github.ref_name }}.tar.gz -C dist .

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FreeJoyXConfiguratorQt-linux-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false

  build-windows:
    name: Build Windows release ${{ github.ref_name }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt 5.15.2 (MinGW 8.1.0)
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'
          tools: 'tools_mingw,qt.tools.win64_mingw810'
          cache: true

      - name: Build
        shell: cmd
        run: |
          set PATH=%IQTA_TOOLS%\mingw810_64\bin;%PATH%
          qmake CONFIG+=release FreeJoyQt.pro
          mingw32-make -j%NUMBER_OF_PROCESSORS%

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          # qmake's SUBDIRS template Release build lands at src\release\.
          $exePath = "src\release\FreeJoyXConfiguratorQt.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "FreeJoyXConfiguratorQt.exe not found at $exePath"
            exit 1
          }
          Copy-Item $exePath dist\
          # windeployqt bundles Qt DLLs + plugins. jurplel/install-qt-action
          # sets QT_ROOT_DIR to the Qt install root; Qt5_DIR points at the
          # cmake config subdir (lib/cmake) which is the wrong base for
          # finding bin/windeployqt.exe.
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations dist\FreeJoyXConfiguratorQt.exe
          # MinGW runtime DLLs that windeployqt doesn't always pick up.
          $mingwBin = "$env:IQTA_TOOLS\mingw810_64\bin"
          foreach ($dll in 'libgcc_s_seh-1.dll', 'libstdc++-6.dll', 'libwinpthread-1.dll') {
            if (Test-Path "$mingwBin\$dll") {
              Copy-Item "$mingwBin\$dll" dist\
            }
          }
          Compress-Archive -Path dist\* -DestinationPath "FreeJoyXConfiguratorQt-windows-${{ github.ref_name }}.zip"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FreeJoyXConfiguratorQt-windows-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
