name: Release

on:
  push:
    tags: ['v*']
  # Allow manual re-run against an existing tag to retro-add a new
  # platform asset without cutting a new release.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag to (re)build release for (e.g., v0.1.1)'
        required: false
        default: ''

permissions:
  contents: write  # softprops/action-gh-release needs write to create / modify the Release

env:
  # Source of the `freejoyx-flash` install helper. The configurator shells out
  # to this Rust binary for the F411 USB-DFU install/reinstall flow and expects
  # it bundled next to the executable (see src/flash/dfuinstallsession.cpp).
  # Bump FREEJOYX_FLASH_REF to a tag/SHA to pin a specific helper build.
  FREEJOYX_FLASH_REPO: anpeaco/FreeJoyXConfigurator
  FREEJOYX_FLASH_REF: main

jobs:
  build-linux:
    name: Build Linux release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout install helper source
        uses: actions/checkout@v6
        with:
          repository: ${{ env.FREEJOYX_FLASH_REPO }}
          ref: ${{ env.FREEJOYX_FLASH_REF }}
          path: freejoyx-flash-src

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # build-essential/libudev-dev for the Qt app; libusb-1.0/pkg-config
          # for the freejoyx-flash helper's USB (DfuSe) backend.
          sudo apt-get install -y build-essential libudev-dev libusb-1.0-0-dev pkg-config

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: Build
        run: |
          qmake CONFIG+=release FreeJoyQt.pro
          make -j$(nproc)

      - name: Build install helper (freejoyx-flash)
        # Build only the helper binary (the repo also hosts the full Rust
        # configurator rewrite, which we don't need here). --bin resolves the
        # target across a workspace or a single crate alike.
        run: cargo build --release --bin freejoyx-flash --manifest-path freejoyx-flash-src/Cargo.toml

      - name: Package
        run: |
          mkdir -p dist
          # qmake's SUBDIRS template on Linux drops the binary at src/<TARGET>
          # (no release/ subdir like the MinGW build on Windows).
          cp src/FreeJoyXConfiguratorQt dist/

          # Bundle the DfuSe install helper next to the configurator so the
          # in-app "Install / Reinstall (USB DFU)" feature can find it.
          # DfuInstallSession::helperPath() looks for it in the application
          # folder; without it the feature hard-stops (issue #80). Fail the
          # release loudly rather than ship a broken installer again.
          helper="freejoyx-flash-src/target/release/freejoyx-flash"
          if [ ! -f "$helper" ]; then
            echo "::error::install helper not found at $helper -- F411 USB-DFU install would ship broken"
            exit 1
          fi
          cp "$helper" dist/
          chmod +x dist/freejoyx-flash

          tar -czf FreeJoyXConfiguratorQt-linux-${{ github.ref_name }}.tar.gz -C dist .

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FreeJoyXConfiguratorQt-linux-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false

  build-windows:
    name: Build Windows release ${{ github.ref_name }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout install helper source
        uses: actions/checkout@v6
        with:
          repository: ${{ env.FREEJOYX_FLASH_REPO }}
          ref: ${{ env.FREEJOYX_FLASH_REF }}
          path: freejoyx-flash-src

      - name: Install Qt 5.15.2 (MinGW 8.1.0)
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'
          tools: 'tools_mingw,qt.tools.win64_mingw810'
          cache: true

      - name: Build
        shell: cmd
        run: |
          set PATH=%IQTA_TOOLS%\mingw810_64\bin;%PATH%
          qmake CONFIG+=release FreeJoyQt.pro
          mingw32-make -j%NUMBER_OF_PROCESSORS%

      - name: Build install helper (freejoyx-flash)
        shell: pwsh
        # cargo / Rust (MSVC) ships preinstalled on windows-latest runners.
        # --bin builds only the helper, not the full Rust configurator rewrite.
        run: cargo build --release --bin freejoyx-flash --manifest-path freejoyx-flash-src\Cargo.toml

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          # qmake's SUBDIRS template Release build lands at src\release\.
          $exePath = "src\release\FreeJoyXConfiguratorQt.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "FreeJoyXConfiguratorQt.exe not found at $exePath"
            exit 1
          }
          Copy-Item $exePath dist\

          # Bundle the DfuSe install helper (freejoyx-flash.exe) next to the
          # configurator. DfuInstallSession::helperPath() looks for it in the
          # application folder; without it the in-app "Install / Reinstall
          # (USB DFU)" feature hard-stops with "install helper is missing"
          # (issue #80). Fail loudly rather than ship a broken zip again.
          $helperPath = "freejoyx-flash-src\target\release\freejoyx-flash.exe"
          if (-not (Test-Path $helperPath)) {
            Write-Error "install helper not found at $helperPath -- F411 USB-DFU install would ship broken"
            exit 1
          }
          Copy-Item $helperPath dist\

          # Manual Qt deploy. windeployqt repeatedly failed with "Unable to
          # find the platform plugin." on install-qt-action's Qt install
          # layout despite plugins/platforms/qwindows.dll being present.
          # Just copy what we know we need: src.pro uses Core/Gui/Network/
          # Widgets/Svg, plus the windows platform plugin, plus image
          # format plugins for SVG/PNG icons, plus the SQL light plugins
          # for styles, plus MinGW runtime.
          $qtBin = "$env:QT_ROOT_DIR\bin"
          $qtPlug = "$env:QT_ROOT_DIR\plugins"

          # Core Qt DLLs (Release MinGW build -- no debug suffix)
          foreach ($dll in 'Qt5Core.dll', 'Qt5Gui.dll', 'Qt5Network.dll', 'Qt5Widgets.dll', 'Qt5Svg.dll') {
            Copy-Item "$qtBin\$dll" dist\
          }

          # Platform plugin (qwindows.dll) -- must live under platforms/
          New-Item -ItemType Directory -Path dist\platforms | Out-Null
          Copy-Item "$qtPlug\platforms\qwindows.dll" dist\platforms\

          # Image format plugins for SVG icons + PNG resources
          New-Item -ItemType Directory -Path dist\imageformats | Out-Null
          foreach ($plug in 'qsvg.dll', 'qico.dll') {
            if (Test-Path "$qtPlug\imageformats\$plug") {
              Copy-Item "$qtPlug\imageformats\$plug" dist\imageformats\
            }
          }

          # Styles plugin for native Windows look
          New-Item -ItemType Directory -Path dist\styles | Out-Null
          if (Test-Path "$qtPlug\styles\qwindowsvistastyle.dll") {
            Copy-Item "$qtPlug\styles\qwindowsvistastyle.dll" dist\styles\
          }

          # MinGW runtime so end users don't need MinGW installed
          $mingwBin = "$env:IQTA_TOOLS\mingw810_64\bin"
          foreach ($dll in 'libgcc_s_seh-1.dll', 'libstdc++-6.dll', 'libwinpthread-1.dll') {
            if (Test-Path "$mingwBin\$dll") {
              Copy-Item "$mingwBin\$dll" dist\
            }
          }

          Write-Host "=== dist/ contents ==="
          Get-ChildItem -Recurse dist | Format-Table FullName, Length

          Compress-Archive -Path dist\* -DestinationPath "FreeJoyXConfiguratorQt-windows-${{ github.ref_name }}.zip"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FreeJoyXConfiguratorQt-windows-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
