name: Release

on:
  push:
    tags: ['v*']
  # Allow manual re-run against an existing tag to retro-add a new
  # platform asset without cutting a new release.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag to (re)build release for (e.g., v0.1.1)'
        required: false
        default: ''

permissions:
  contents: write  # softprops/action-gh-release needs write to create / modify the Release

# The configurator bundles two sidecars:
#   - freejoyx-dfu  -- the DfuSe install helper, built in-repo from
#     tools/freejoyx-dfu (Windows uses the winusb-autobind / libwdi build;
#     Linux uses the plain build). Always the matched pair for this commit.
#   - the F103 AND F411 boot+app firmware bins, pulled from the LATEST
#     anpeaco/FreeJoyX release so a download always carries current firmware
#     for both supported boards.
# The firmware is fetched with `gh release download` (public repo, default job
# token has read access); the helper is built here.

jobs:
  build-linux:
    name: Build Linux release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libudev-dev

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: Build
        run: |
          # App version shown in-app = the release tag minus "v" (see src/src.pro).
          export FREEJOYX_APP_VERSION="$(echo '${{ github.ref_name }}' | sed 's/^v//')"
          echo "Configurator app version: $FREEJOYX_APP_VERSION"
          qmake CONFIG+=release FreeJoyQt.pro
          make -j$(nproc)

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build DFU helper (freejoyx-dfu)
        run: |
          # Linux needs no WinUSB autobind (udev handles device access) -- plain
          # nusb build.
          cargo build --release --manifest-path tools/freejoyx-dfu/Cargo.toml
          mkdir -p dist
          cp tools/freejoyx-dfu/target/release/freejoyx-dfu dist/freejoyx-dfu
          chmod +x dist/freejoyx-dfu

      - name: Fetch F411 firmware
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/firmware
          # Latest F103 + F411 firmware (app + boot) from the firmware repo.
          gh release download --repo anpeaco/FreeJoyX \
            --pattern 'freejoyx-f103-app-*.bin' --pattern 'freejoyx-f103-boot-*.bin' \
            --pattern 'freejoyx-f411-app-*.bin' --pattern 'freejoyx-f411-boot-*.bin' \
            --dir dist/firmware --clobber
          # The configurator looks for UNVERSIONED names next to the exe or under
          # firmware/ (dfuinstalldialog.cpp kBootBinName/kAppBinName) -- strip the
          # version suffix the release assets carry.
          mv dist/firmware/freejoyx-f103-app-*.bin  dist/firmware/freejoyx-f103-app.bin
          mv dist/firmware/freejoyx-f103-boot-*.bin dist/firmware/freejoyx-f103-boot.bin
          mv dist/firmware/freejoyx-f411-app-*.bin  dist/firmware/freejoyx-f411-app.bin
          mv dist/firmware/freejoyx-f411-boot-*.bin dist/firmware/freejoyx-f411-boot.bin

      - name: Package
        run: |
          # qmake's SUBDIRS template on Linux drops the binary at src/<TARGET>
          # (no release/ subdir like the MinGW build on Windows). dist/ already
          # holds the helper + firmware/ from the previous step.
          cp src/FreeJoyXConfiguratorQt dist/
          echo "=== dist/ contents ==="
          find dist -type f -printf '%P\t%s bytes\n'
          tar -czf FreeJoyXConfiguratorQt-linux-${{ github.ref_name }}.tar.gz -C dist .

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FreeJoyXConfiguratorQt-linux-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false

  build-windows:
    name: Build Windows release ${{ github.ref_name }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt 5.15.2 (MinGW 8.1.0) + OpenSSL 1.1
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'
          # MinGW toolchain only. Qt5Network loads OpenSSL at RUNTIME, so the
          # build needs no OpenSSL tool. The OpenSSL 1.1.1 runtime DLLs are
          # vendored in ci/openssl-redist/ and copied in the Package step below
          # (Qt removed its own tools_openssl_x64 package -- see that README).
          tools: 'tools_mingw,qt.tools.win64_mingw810'
          cache: true

      - name: Build
        shell: cmd
        run: |
          set PATH=%IQTA_TOOLS%\mingw810_64\bin;%PATH%
          rem App version shown in-app = the release tag minus "v" (see src/src.pro).
          set FREEJOYX_APP_VERSION=${{ github.ref_name }}
          set FREEJOYX_APP_VERSION=%FREEJOYX_APP_VERSION:v=%
          echo Configurator app version: %FREEJOYX_APP_VERSION%
          qmake CONFIG+=release FreeJoyQt.pro
          mingw32-make -j%NUMBER_OF_PROCESSORS%

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          # qmake's SUBDIRS template Release build lands at src\release\.
          $exePath = "src\release\FreeJoyXConfiguratorQt.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "FreeJoyXConfiguratorQt.exe not found at $exePath"
            exit 1
          }
          Copy-Item $exePath dist\

          # Manual Qt deploy. windeployqt repeatedly failed with "Unable to
          # find the platform plugin." on install-qt-action's Qt install
          # layout despite plugins/platforms/qwindows.dll being present.
          # Just copy what we know we need: src.pro uses Core/Gui/Network/
          # Widgets/Svg, plus the windows platform plugin, plus image
          # format plugins for SVG/PNG icons, plus the SQL light plugins
          # for styles, plus MinGW runtime.
          $qtBin = "$env:QT_ROOT_DIR\bin"
          $qtPlug = "$env:QT_ROOT_DIR\plugins"

          # Core Qt DLLs (Release MinGW build -- no debug suffix)
          foreach ($dll in 'Qt5Core.dll', 'Qt5Gui.dll', 'Qt5Network.dll', 'Qt5Widgets.dll', 'Qt5Svg.dll') {
            Copy-Item "$qtBin\$dll" dist\
          }

          # Platform plugin (qwindows.dll) -- must live under platforms/
          New-Item -ItemType Directory -Path dist\platforms | Out-Null
          Copy-Item "$qtPlug\platforms\qwindows.dll" dist\platforms\

          # Image format plugins for SVG icons + PNG/JPEG resources. qjpeg is
          # required for the F103/F411 board renders (Images/*_render.jpg in
          # resources.qrc) -- without it Qt silently fails to decode them and
          # the board images come up blank. PNG (pinout.png) is handled by Qt
          # core, so only JPEG/SVG/ICO need explicit plugins here.
          New-Item -ItemType Directory -Path dist\imageformats | Out-Null
          foreach ($plug in 'qsvg.dll', 'qico.dll', 'qjpeg.dll') {
            if (Test-Path "$qtPlug\imageformats\$plug") {
              Copy-Item "$qtPlug\imageformats\$plug" dist\imageformats\
            }
          }

          # Styles plugin for native Windows look
          New-Item -ItemType Directory -Path dist\styles | Out-Null
          if (Test-Path "$qtPlug\styles\qwindowsvistastyle.dll") {
            Copy-Item "$qtPlug\styles\qwindowsvistastyle.dll" dist\styles\
          }

          # MinGW runtime so end users don't need MinGW installed
          $mingwBin = "$env:IQTA_TOOLS\mingw810_64\bin"
          foreach ($dll in 'libgcc_s_seh-1.dll', 'libstdc++-6.dll', 'libwinpthread-1.dll') {
            if (Test-Path "$mingwBin\$dll") {
              Copy-Item "$mingwBin\$dll" dist\
            }
          }

          # OpenSSL 1.1 runtime so Qt5Network can negotiate TLS (HTTPS). Without
          # it the online firmware-release list (FirmwareLibrary -> GitHub API)
          # dies with "TLS initialization failed". Vendored in ci/openssl-redist/
          # (OpenSSL 1.1.1w x64) because Qt removed its tools_openssl_x64 package
          # and Qt 5.15.2 can't load OpenSSL 3.x -- see that dir's README.
          $sslDir = "ci\openssl-redist"
          foreach ($dll in 'libssl-1_1-x64.dll', 'libcrypto-1_1-x64.dll') {
            $src = Join-Path $sslDir $dll
            if (-not (Test-Path $src)) {
              Write-Error "Vendored OpenSSL DLL missing: $src"
              exit 1
            }
            Copy-Item $src dist\
          }

          Write-Host "=== dist/ (app + Qt runtime) assembled ==="
          Get-ChildItem -Recurse dist | Format-Table FullName, Length

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add ARM64 MSVC build tools (libwdi-sys always builds an ARM64 installer)
        shell: pwsh
        run: |
          $vs = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
          $path = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          & $vs modify --installPath $path `
            --add Microsoft.VisualStudio.Component.VC.Tools.ARM64 `
            --quiet --norestart --nocache
          while (Get-Process -Name 'vs_installer','setup' -ErrorAction SilentlyContinue) {
            Start-Sleep -Seconds 5
          }

      - name: Point WDK_DIR at the vendored redist (for the winusb-autobind build)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $wdk = Join-Path $env:GITHUB_WORKSPACE 'ci\wdk-redist'
          foreach ($f in 'redist\wdf\x64\WdfCoInstaller01011.dll',
                         'redist\wdf\x64\winusbcoinstaller2.dll',
                         'redist\wdf\x86\WdfCoInstaller01011.dll',
                         'redist\wdf\x86\winusbcoinstaller2.dll') {
            if (-not (Test-Path (Join-Path $wdk $f))) { throw "vendored WDK redist missing: $f" }
          }
          "WDK_DIR=$wdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/freejoyx-dfu

      - name: Build DFU helper (freejoyx-dfu, winusb-autobind)
        run: cargo build --release --features winusb-autobind --manifest-path tools/freejoyx-dfu/Cargo.toml

      - name: Verify autobind is compiled in
        shell: pwsh
        run: |
          $out = & tools\freejoyx-dfu\target\release\freejoyx-dfu.exe bind-winusb 2>&1 | Out-String
          Write-Host $out
          if ($out -match 'not built into this helper') {
            Write-Error "winusb-autobind feature is missing -- build produced the stub bind path"
            exit 1
          }
          # bind-winusb exits non-zero on the runner ("device not found", the
          # expected PASS); force success so pwsh doesn't propagate $LASTEXITCODE.
          Write-Host "OK: winusb-autobind is compiled in"
          exit 0

      - name: Bundle helper + F411 firmware, then zip
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path dist\firmware -Force | Out-Null
          # DFU helper built in-repo above (matched pair for this commit).
          Copy-Item tools\freejoyx-dfu\target\release\freejoyx-dfu.exe dist\freejoyx-dfu.exe
          # Latest F103 + F411 firmware (app + boot) from the firmware repo.
          gh release download --repo anpeaco/FreeJoyX `
            --pattern 'freejoyx-f103-app-*.bin' --pattern 'freejoyx-f103-boot-*.bin' `
            --pattern 'freejoyx-f411-app-*.bin' --pattern 'freejoyx-f411-boot-*.bin' `
            --dir dist\firmware --clobber
          # The configurator expects UNVERSIONED names (dfuinstalldialog.cpp
          # kBootBinName/kAppBinName) -- strip the version suffix.
          Get-ChildItem dist\firmware\freejoyx-f103-app-*.bin  | Select-Object -First 1 |
            Move-Item -Destination dist\firmware\freejoyx-f103-app.bin -Force
          Get-ChildItem dist\firmware\freejoyx-f103-boot-*.bin | Select-Object -First 1 |
            Move-Item -Destination dist\firmware\freejoyx-f103-boot.bin -Force
          Get-ChildItem dist\firmware\freejoyx-f411-app-*.bin  | Select-Object -First 1 |
            Move-Item -Destination dist\firmware\freejoyx-f411-app.bin -Force
          Get-ChildItem dist\firmware\freejoyx-f411-boot-*.bin | Select-Object -First 1 |
            Move-Item -Destination dist\firmware\freejoyx-f411-boot.bin -Force
          Write-Host "=== final dist/ contents ==="
          Get-ChildItem -Recurse dist | Format-Table FullName, Length
          Compress-Archive -Path dist\* -DestinationPath "FreeJoyXConfiguratorQt-windows-${{ github.ref_name }}.zip" -Force

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FreeJoyXConfiguratorQt-windows-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
