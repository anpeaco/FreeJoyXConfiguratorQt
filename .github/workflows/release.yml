name: Release

on:
  push:
    tags: ['v*']
  # Allow manual re-run against an existing tag to retro-add a new
  # platform asset without cutting a new release.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag to (re)build release for (e.g., v0.1.1)'
        required: false
        default: ''

permissions:
  contents: write  # softprops/action-gh-release needs write to create / modify the Release

# The configurator ships two sidecar artifacts it does NOT build itself:
#   - freejoyx-flash  -- the DfuSe install helper, built + released by the Rust
#     repo (anpeaco/FreeJoyXConfigurator, release-flash.yml). Pinned by tag here
#     so a configurator release is reproducible; bump when a new helper ships.
#   - the F411 boot+app firmware bins, pulled from the LATEST anpeaco/FreeJoyX
#     release so a download always carries current firmware.
# Both are fetched with `gh release download` (all three repos are public, so
# the default job token has read access) rather than rebuilt here -- that keeps
# the Rust toolchain + libwdi/WDK mess out of this Qt workflow.
env:
  FLASH_HELPER_TAG: flash-v0.1.4   # pinned freejoyx-flash helper release tag

jobs:
  build-linux:
    name: Build Linux release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libudev-dev

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: Build
        run: |
          qmake CONFIG+=release FreeJoyQt.pro
          make -j$(nproc)

      - name: Fetch flasher helper + F411 firmware
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/firmware
          # Pinned freejoyx-flash helper (Linux) from the Rust repo.
          gh release download "$FLASH_HELPER_TAG" --repo anpeaco/FreeJoyXConfigurator \
            --pattern 'freejoyx-flash-linux-x64' --dir dist --clobber
          mv dist/freejoyx-flash-linux-x64 dist/freejoyx-flash
          chmod +x dist/freejoyx-flash
          # Latest F411 firmware (app + boot) from the firmware repo.
          gh release download --repo anpeaco/FreeJoyX \
            --pattern 'freejoyx-f411-app-*.bin' --pattern 'freejoyx-f411-boot-*.bin' \
            --dir dist/firmware --clobber
          # The configurator looks for UNVERSIONED names next to the exe or under
          # firmware/ (dfuinstalldialog.cpp kBootBinName/kAppBinName) -- strip the
          # version suffix the release assets carry.
          mv dist/firmware/freejoyx-f411-app-*.bin  dist/firmware/freejoyx-f411-app.bin
          mv dist/firmware/freejoyx-f411-boot-*.bin dist/firmware/freejoyx-f411-boot.bin

      - name: Package
        run: |
          # qmake's SUBDIRS template on Linux drops the binary at src/<TARGET>
          # (no release/ subdir like the MinGW build on Windows). dist/ already
          # holds the helper + firmware/ from the previous step.
          cp src/FreeJoyXConfiguratorQt dist/
          echo "=== dist/ contents ==="
          find dist -type f -printf '%P\t%s bytes\n'
          tar -czf FreeJoyXConfiguratorQt-linux-${{ github.ref_name }}.tar.gz -C dist .

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FreeJoyXConfiguratorQt-linux-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false

  build-windows:
    name: Build Windows release ${{ github.ref_name }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt 5.15.2 (MinGW 8.1.0)
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'
          tools: 'tools_mingw,qt.tools.win64_mingw810'
          cache: true

      - name: Build
        shell: cmd
        run: |
          set PATH=%IQTA_TOOLS%\mingw810_64\bin;%PATH%
          qmake CONFIG+=release FreeJoyQt.pro
          mingw32-make -j%NUMBER_OF_PROCESSORS%

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          # qmake's SUBDIRS template Release build lands at src\release\.
          $exePath = "src\release\FreeJoyXConfiguratorQt.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "FreeJoyXConfiguratorQt.exe not found at $exePath"
            exit 1
          }
          Copy-Item $exePath dist\

          # Manual Qt deploy. windeployqt repeatedly failed with "Unable to
          # find the platform plugin." on install-qt-action's Qt install
          # layout despite plugins/platforms/qwindows.dll being present.
          # Just copy what we know we need: src.pro uses Core/Gui/Network/
          # Widgets/Svg, plus the windows platform plugin, plus image
          # format plugins for SVG/PNG icons, plus the SQL light plugins
          # for styles, plus MinGW runtime.
          $qtBin = "$env:QT_ROOT_DIR\bin"
          $qtPlug = "$env:QT_ROOT_DIR\plugins"

          # Core Qt DLLs (Release MinGW build -- no debug suffix)
          foreach ($dll in 'Qt5Core.dll', 'Qt5Gui.dll', 'Qt5Network.dll', 'Qt5Widgets.dll', 'Qt5Svg.dll') {
            Copy-Item "$qtBin\$dll" dist\
          }

          # Platform plugin (qwindows.dll) -- must live under platforms/
          New-Item -ItemType Directory -Path dist\platforms | Out-Null
          Copy-Item "$qtPlug\platforms\qwindows.dll" dist\platforms\

          # Image format plugins for SVG icons + PNG resources
          New-Item -ItemType Directory -Path dist\imageformats | Out-Null
          foreach ($plug in 'qsvg.dll', 'qico.dll') {
            if (Test-Path "$qtPlug\imageformats\$plug") {
              Copy-Item "$qtPlug\imageformats\$plug" dist\imageformats\
            }
          }

          # Styles plugin for native Windows look
          New-Item -ItemType Directory -Path dist\styles | Out-Null
          if (Test-Path "$qtPlug\styles\qwindowsvistastyle.dll") {
            Copy-Item "$qtPlug\styles\qwindowsvistastyle.dll" dist\styles\
          }

          # MinGW runtime so end users don't need MinGW installed
          $mingwBin = "$env:IQTA_TOOLS\mingw810_64\bin"
          foreach ($dll in 'libgcc_s_seh-1.dll', 'libstdc++-6.dll', 'libwinpthread-1.dll') {
            if (Test-Path "$mingwBin\$dll") {
              Copy-Item "$mingwBin\$dll" dist\
            }
          }

          Write-Host "=== dist/ (app + Qt runtime) assembled ==="
          Get-ChildItem -Recurse dist | Format-Table FullName, Length

      - name: Fetch flasher helper + F411 firmware, then zip
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path dist\firmware -Force | Out-Null
          # Pinned freejoyx-flash helper (Windows) from the Rust repo.
          gh release download "$env:FLASH_HELPER_TAG" --repo anpeaco/FreeJoyXConfigurator `
            --pattern 'freejoyx-flash-windows-x64.exe' --dir dist --clobber
          Move-Item -Force dist\freejoyx-flash-windows-x64.exe dist\freejoyx-flash.exe
          # Latest F411 firmware (app + boot) from the firmware repo.
          gh release download --repo anpeaco/FreeJoyX `
            --pattern 'freejoyx-f411-app-*.bin' --pattern 'freejoyx-f411-boot-*.bin' `
            --dir dist\firmware --clobber
          # The configurator expects UNVERSIONED names (dfuinstalldialog.cpp
          # kBootBinName/kAppBinName) -- strip the version suffix.
          Get-ChildItem dist\firmware\freejoyx-f411-app-*.bin  | Select-Object -First 1 |
            Move-Item -Destination dist\firmware\freejoyx-f411-app.bin -Force
          Get-ChildItem dist\firmware\freejoyx-f411-boot-*.bin | Select-Object -First 1 |
            Move-Item -Destination dist\firmware\freejoyx-f411-boot.bin -Force
          Write-Host "=== final dist/ contents ==="
          Get-ChildItem -Recurse dist | Format-Table FullName, Length
          Compress-Archive -Path dist\* -DestinationPath "FreeJoyXConfiguratorQt-windows-${{ github.ref_name }}.zip" -Force

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FreeJoyXConfiguratorQt-windows-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
