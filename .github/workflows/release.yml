name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write  # softprops/action-gh-release needs write to create the Release

jobs:
  release:
    name: Build Linux release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libudev-dev

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: Build
        run: |
          qmake FreeJoyQt.pro
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          cp src/FreeJoyQt dist/
          tar -czf FreeJoyQt-linux-${{ github.ref_name }}.tar.gz -C dist .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FreeJoyQt-linux-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
