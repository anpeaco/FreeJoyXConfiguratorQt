name: Release

on:
  push:
    tags: ['v*']
  # Allow manual re-run against an existing tag to rebuild and re-publish its
  # release assets (e.g. to retro-bundle the freejoyx-flash helper) without
  # cutting a new tag. The `ref` input drives both the source checkout and the
  # target release.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag to (re)build & re-publish the release for (e.g., v0.1.4)'
        required: false
        default: ''
      helper_ref:
        description: 'Ref of anpeaco/FreeJoyXConfigurator to build freejoyx-flash from'
        required: false
        default: 'main'
      firmware_ref:
        description: 'FreeJoyX firmware release tag to bundle F411 bins from (default: paired tag)'
        required: false
        default: ''

permissions:
  contents: write  # softprops/action-gh-release needs write to create / modify the Release

jobs:
  build-linux:
    name: Build Linux release ${{ inputs.ref || github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # On a tag push this is empty -> checks out the pushed tag. On a
          # manual re-run, build the tag named in the `ref` input so we can
          # retro-update an existing release (e.g. v0.1.4).
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # build-essential + libudev-dev for the build; the libxcb*/libxkb*
          # runtime libs must be present on the builder so linuxdeploy's Qt
          # plugin can copy them into the AppImage (Qt's xcb platform plugin
          # needs them, and the headless runner doesn't ship them all).
          sudo apt-get install -y \
            build-essential libudev-dev \
            libxcb1 libxcb-glx0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render0 libxcb-render-util0 libxcb-shape0 \
            libxcb-shm0 libxcb-sync1 libxcb-util1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 libxkbcommon-x11-0 \
            libfontconfig1 libfreetype6 libx11-xcb1 libgl1

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: Build
        run: |
          qmake CONFIG+=release FreeJoyQt.pro
          make -j$(nproc)

      # The configurator shells out to the `freejoyx-flash` install helper,
      # which lives in the sibling anpeaco/FreeJoyXConfigurator repo. It must
      # ship next to the executable or "Install Firmware" fails with
      # "Install helper (freejoyx-flash) is missing from the application
      # folder." (issue #80). Build it here and bundle it below.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout flash helper source
        uses: actions/checkout@v6
        with:
          repository: anpeaco/FreeJoyXConfigurator
          ref: ${{ inputs.helper_ref || 'main' }}
          path: helper-src

      - name: Build freejoyx-flash helper
        run: cargo build --release --manifest-path helper-src/Cargo.toml -p freejoyx-flash

      # Bundle the F411 firmware so "F411 Install…" works out of the box. The
      # paired FreeJoyX release ships per-board app+boot .bins; the DFU dialog
      # auto-discovers them under the un-versioned names in a firmware/ folder.
      # anpeaco/FreeJoyX is public, so the asset URLs need no auth.
      - name: Download F411 firmware
        env:
          FW: ${{ inputs.firmware_ref || inputs.ref || github.ref_name }}
        run: |
          set -euxo pipefail
          mkdir -p fw
          base="https://github.com/anpeaco/FreeJoyX/releases/download/$FW"
          curl -fSL -o fw/freejoyx-f411-boot.bin "$base/freejoyx-f411-boot-$FW.bin"
          curl -fSL -o fw/freejoyx-f411-app.bin  "$base/freejoyx-f411-app-$FW.bin"

      # Build a self-contained AppImage so the download needs nothing
      # pre-installed: linuxdeploy's Qt plugin bundles the Qt libraries and
      # plugins (xcb platform plugin, all imageformats incl. qjpeg, styles).
      # The freejoyx-flash helper is dropped next to the executable in
      # usr/bin/ so applicationDirPath() still finds it at runtime.
      - name: Package (AppImage)
        env:
          OUTPUT: FreeJoyXConfiguratorQt-linux-${{ inputs.ref || github.ref_name }}.AppImage
          VERSION: ${{ inputs.ref || github.ref_name }}
        run: |
          set -euxo pipefail
          # Runners may lack FUSE; tell the AppImage tooling to self-extract.
          export APPIMAGE_EXTRACT_AND_RUN=1
          # Point the Qt plugin at the kit we just built against. cwd goes on
          # PATH so linuxdeploy discovers the qt plugin (with extract-and-run
          # it executes from a temp dir, so it won't look in $PWD otherwise).
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          export PATH="$PWD:$QT_ROOT_DIR/bin:$PATH"

          base=https://github.com/linuxdeploy
          wget -qO linuxdeploy.AppImage \
            "$base/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -qO linuxdeploy-plugin-qt.AppImage \
            "$base/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy*.AppImage

          # Assemble the AppDir.
          mkdir -p AppDir/usr/bin/firmware
          cp src/FreeJoyXConfiguratorQt               AppDir/usr/bin/
          cp helper-src/target/release/freejoyx-flash AppDir/usr/bin/
          cp fw/freejoyx-f411-boot.bin AppDir/usr/bin/firmware/
          cp fw/freejoyx-f411-app.bin  AppDir/usr/bin/firmware/
          cp src/Images/icon.png AppDir/FreeJoyXConfiguratorQt.png
          {
            echo '[Desktop Entry]'
            echo 'Type=Application'
            echo 'Name=FreeJoyX Configurator'
            echo 'Exec=FreeJoyXConfiguratorQt'
            echo 'Icon=FreeJoyXConfiguratorQt'
            echo 'Categories=Utility;'
            echo 'Terminal=false'
          } > AppDir/FreeJoyXConfiguratorQt.desktop

          ./linuxdeploy.AppImage --appdir AppDir \
            --executable AppDir/usr/bin/FreeJoyXConfiguratorQt \
            --desktop-file AppDir/FreeJoyXConfiguratorQt.desktop \
            --icon-file AppDir/FreeJoyXConfiguratorQt.png \
            --plugin qt \
            --output appimage

          # linuxdeploy honours $OUTPUT for the filename, but normalise just
          # in case the tool version ignores it.
          if [ ! -f "$OUTPUT" ]; then
            mv FreeJoyX*.AppImage "$OUTPUT"
          fi
          ls -l "$OUTPUT"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.ref || github.ref_name }}
          files: FreeJoyXConfiguratorQt-linux-${{ inputs.ref || github.ref_name }}.AppImage
          # Only auto-generate notes when first cutting a tag. On a manual
          # re-run (retro-bundling an asset) leave the existing -- often
          # hand-edited -- release body untouched.
          generate_release_notes: ${{ github.event_name == 'push' }}
          fail_on_unmatched_files: true
          draft: false

  build-windows:
    name: Build Windows release ${{ inputs.ref || github.ref_name }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Install Qt 5.15.2 (MinGW 8.1.0)
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'
          tools: 'tools_mingw,qt.tools.win64_mingw810'
          cache: true

      - name: Build
        shell: cmd
        run: |
          set PATH=%IQTA_TOOLS%\mingw810_64\bin;%PATH%
          qmake CONFIG+=release FreeJoyQt.pro
          mingw32-make -j%NUMBER_OF_PROCESSORS%

      # See the Linux job: the freejoyx-flash install helper must ship next to
      # the executable or firmware install fails (issue #80). On Windows we
      # build it WITH the `winusb-autobind` feature so the helper installs the
      # WinUSB driver onto the STM32 ROM DFU device (0483:DF11) itself via one
      # UAC prompt -- otherwise the user must run Zadig by hand before an
      # install can reach the device.
      # NOTE: winusb-autobind pulls libwdi-sys, which always compiles an ARM64
      # installer stub and so needs the MSVC ARM64 build tools. Those ship on
      # the GitHub windows runner image, so we rely on them being present --
      # do NOT `setup.exe modify` to add them: modifying Visual Studio on a
      # hosted runner tears the job down mid-run.
      - name: Install Rust toolchain (MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout flash helper source
        uses: actions/checkout@v6
        with:
          repository: anpeaco/FreeJoyXConfigurator
          ref: ${{ inputs.helper_ref || 'main' }}
          path: helper-src

      # libwdi-sys embeds the WDK WinUSB/WDF co-installers; with WDK_DIR unset
      # it looks under a hardcoded "Windows Kits\8.0" path that isn't on the
      # runner. Assemble a WDK_DIR (redist\wdf\<arch>\{WdfCoInstaller01011,
      # winusbcoinstaller2}.dll) from co-installers already on the image and
      # point WDK_DIR at it for the build below.
      - name: Stage WDK co-installers (WDK_DIR)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $need = 'WdfCoInstaller01011.dll','winusbcoinstaller2.dll'
          $roots = @(
            "${env:ProgramFiles(x86)}\Windows Kits",
            "$env:ProgramFiles\Windows Kits",
            "$env:SystemRoot\System32\DriverStore\FileRepository"
          ) | Where-Object { Test-Path $_ }
          $wdk = Join-Path $env:RUNNER_TEMP 'wdk'
          foreach ($a in 'x64','x86') {
            New-Item -ItemType Directory -Force -Path (Join-Path $wdk "redist\wdf\$a") | Out-Null
          }
          $missing = @()
          foreach ($a in 'x64','x86') {
            $archPat = if ($a -eq 'x64') { 'x64|amd64' } else { 'x86' }
            foreach ($n in $need) {
              $src = Get-ChildItem -Path $roots -Recurse -Filter $n -ErrorAction SilentlyContinue |
                     Where-Object { $_.FullName -match "\\($archPat)\\" } |
                     Select-Object -First 1 -ExpandProperty FullName
              if ($src) {
                Copy-Item $src (Join-Path $wdk "redist\wdf\$a\$n") -Force
                Write-Host "found $a\$n  <-  $src"
              } else {
                $missing += "$a\$n"
              }
            }
          }
          if ($missing.Count) {
            Write-Host "::warning::WDK co-installers not located: $($missing -join ', ')"
            Write-Host "=== co-installer inventory under Windows Kits ==="
            foreach ($r in $roots) {
              Get-ChildItem $r -Recurse -Include $need -ErrorAction SilentlyContinue |
                Select-Object -ExpandProperty FullName
            }
          }
          "WDK_DIR=$wdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "WDK_DIR=$wdk"

      - name: Build freejoyx-flash helper
        shell: cmd
        run: cargo build --release --manifest-path helper-src\Cargo.toml -p freejoyx-flash --features freejoyx-flash/winusb-autobind

      # See the Linux job: bundle the paired F411 firmware so "F411 Install…"
      # finds its bins with no manual browsing. anpeaco/FreeJoyX is public.
      - name: Download F411 firmware
        shell: pwsh
        env:
          FW: ${{ inputs.firmware_ref || inputs.ref || github.ref_name }}
        run: |
          New-Item -ItemType Directory -Path fw | Out-Null
          $base = "https://github.com/anpeaco/FreeJoyX/releases/download/$env:FW"
          Invoke-WebRequest -Uri "$base/freejoyx-f411-boot-$env:FW.bin" -OutFile fw\freejoyx-f411-boot.bin
          Invoke-WebRequest -Uri "$base/freejoyx-f411-app-$env:FW.bin"  -OutFile fw\freejoyx-f411-app.bin

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path dist | Out-Null
          # qmake's SUBDIRS template Release build lands at src\release\.
          $exePath = "src\release\FreeJoyXConfiguratorQt.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "FreeJoyXConfiguratorQt.exe not found at $exePath"
            exit 1
          }
          Copy-Item $exePath dist\

          # Bundle the install helper next to the executable.
          $helperPath = "helper-src\target\release\freejoyx-flash.exe"
          if (-not (Test-Path $helperPath)) {
            Write-Error "freejoyx-flash.exe not found at $helperPath"
            exit 1
          }
          Copy-Item $helperPath dist\

          # Bundle the paired F411 firmware under firmware/ for "F411 Install…".
          New-Item -ItemType Directory -Path dist\firmware | Out-Null
          Copy-Item fw\freejoyx-f411-boot.bin dist\firmware\
          Copy-Item fw\freejoyx-f411-app.bin  dist\firmware\

          # Primary deploy: windeployqt resolves every needed Qt DLL + plugin
          # automatically (platforms\qwindows, all imageformats incl. qjpeg,
          # styles, ...) and writes a qt.conf -- so the bundle can't silently
          # drift the way a hand-maintained list does. Invoke the kit's own
          # windeployqt explicitly (not whatever is first on PATH) with the
          # MinGW runtime on PATH so --compiler-runtime works. An earlier
          # "Unable to find the platform plugin" failure came from invoking
          # the wrong windeployqt; pinning the full path avoids that.
          $env:PATH = "$env:QT_ROOT_DIR\bin;$env:IQTA_TOOLS\mingw810_64\bin;$env:PATH"
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations --compiler-runtime "dist\FreeJoyXConfiguratorQt.exe"
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "windeployqt exit $LASTEXITCODE -- relying on the manual copy floor below."
          }
          # Do NOT let windeployqt's exit code leak to the step result: the
          # cmdlets below don't touch $LASTEXITCODE, so a non-zero here would
          # fail the whole step at the end even though packaging succeeds.
          $global:LASTEXITCODE = 0

          # Fallback floor: guarantee the known-needed pieces exist even if
          # windeployqt misbehaves on the install-qt-action layout. These are
          # cheap and idempotent (Copy-Item overwrites identical files).
          $qtBin = "$env:QT_ROOT_DIR\bin"
          $qtPlug = "$env:QT_ROOT_DIR\plugins"

          # Core Qt DLLs (Release MinGW build -- no debug suffix)
          foreach ($dll in 'Qt5Core.dll', 'Qt5Gui.dll', 'Qt5Network.dll', 'Qt5Widgets.dll', 'Qt5Svg.dll') {
            Copy-Item "$qtBin\$dll" dist\
          }

          # Platform plugin (qwindows.dll) -- must live under platforms/
          New-Item -ItemType Directory -Path dist\platforms | Out-Null
          Copy-Item "$qtPlug\platforms\qwindows.dll" dist\platforms\

          # Image format plugins. PNG is built into QtGui, but SVG icons need
          # qsvg, .ico needs qico, and the BluePill/BlackPill board *render*
          # images are JPEGs (:/Images/*_render.jpg) so they need qjpeg --
          # without it the board pictures show blank (issue #80 follow-up).
          New-Item -ItemType Directory -Path dist\imageformats | Out-Null
          foreach ($plug in 'qsvg.dll', 'qico.dll', 'qjpeg.dll') {
            if (Test-Path "$qtPlug\imageformats\$plug") {
              Copy-Item "$qtPlug\imageformats\$plug" dist\imageformats\
            }
          }

          # Styles plugin for native Windows look
          New-Item -ItemType Directory -Path dist\styles | Out-Null
          if (Test-Path "$qtPlug\styles\qwindowsvistastyle.dll") {
            Copy-Item "$qtPlug\styles\qwindowsvistastyle.dll" dist\styles\
          }

          # MinGW runtime so end users don't need MinGW installed
          $mingwBin = "$env:IQTA_TOOLS\mingw810_64\bin"
          foreach ($dll in 'libgcc_s_seh-1.dll', 'libstdc++-6.dll', 'libwinpthread-1.dll') {
            if (Test-Path "$mingwBin\$dll") {
              Copy-Item "$mingwBin\$dll" dist\
            }
          }

          Write-Host "=== dist/ contents ==="
          Get-ChildItem -Recurse dist | Format-Table FullName, Length

          Compress-Archive -Path dist\* -DestinationPath "FreeJoyXConfiguratorQt-windows-${{ inputs.ref || github.ref_name }}.zip"
          exit 0

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.ref || github.ref_name }}
          files: FreeJoyXConfiguratorQt-windows-${{ inputs.ref || github.ref_name }}.zip
          # See the Linux job: preserve hand-edited notes on manual re-runs.
          generate_release_notes: ${{ github.event_name == 'push' }}
          fail_on_unmatched_files: true
          draft: false
