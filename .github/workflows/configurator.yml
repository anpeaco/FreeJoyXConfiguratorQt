name: Configurator build

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-linux:
    name: Build (Ubuntu, Qt 5.15)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libudev-dev

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: qmake
        run: qmake CONFIG+=release FreeJoyQt.pro

      - name: make
        run: make -j$(nproc)

      - name: Upload configurator binary
        uses: actions/upload-artifact@v7
        with:
          # qmake's SUBDIRS template on Linux lands the binary at
          # src/<TARGET> (no release/ subdir, unlike the MinGW build).
          name: FreeJoyXConfiguratorQt-linux
          path: src/FreeJoyXConfiguratorQt
          if-no-files-found: error
          retention-days: 30

  # Windows build published as a downloadable CI artifact (NOT a release) so a
  # branch/PR can be smoke-tested on Windows without tagging. Mirrors the
  # release.yml Windows build + manual Qt deploy. The DFU install helper
  # (tools/freejoyx-dfu) is built in-repo below and bundled next to the app, so
  # the artifact is a self-contained, matched pair for the commit under test --
  # no manual drop-in.
  build-windows:
    name: Build (Windows, Qt 5.15, artifact)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt 5.15.2 (MinGW 8.1.0) + OpenSSL 1.1
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'
          # MinGW toolchain only. This is a build-only CI job: Qt5Network loads
          # OpenSSL at RUNTIME, not link time, so the build needs no OpenSSL. The
          # release packaging vendors OpenSSL 1.1.1 from ci/openssl-redist/ (Qt
          # pulled its own tools_openssl_x64 package; see that dir's README).
          tools: 'tools_mingw,qt.tools.win64_mingw810'
          cache: true

      - name: Build
        shell: cmd
        run: |
          set PATH=%IQTA_TOOLS%\mingw810_64\bin;%PATH%
          qmake CONFIG+=release FreeJoyQt.pro
          mingw32-make -j%NUMBER_OF_PROCESSORS%

      # --- DFU install helper (tools/freejoyx-dfu) ---------------------------
      # Built in-repo with the WinUSB auto-bind engine (libwdi) and bundled next
      # to the app below. Steps mirror the old release-flash.yml that used to
      # live in the Rust repo.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add ARM64 MSVC build tools (libwdi-sys always builds an ARM64 installer)
        shell: pwsh
        run: |
          $vs = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
          $path = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          & $vs modify --installPath $path `
            --add Microsoft.VisualStudio.Component.VC.Tools.ARM64 `
            --quiet --norestart --nocache
          while (Get-Process -Name 'vs_installer','setup' -ErrorAction SilentlyContinue) {
            Start-Sleep -Seconds 5
          }

      - name: Point WDK_DIR at the vendored redist (for the winusb-autobind build)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $wdk = Join-Path $env:GITHUB_WORKSPACE 'ci\wdk-redist'
          foreach ($f in 'redist\wdf\x64\WdfCoInstaller01011.dll',
                         'redist\wdf\x64\winusbcoinstaller2.dll',
                         'redist\wdf\x86\WdfCoInstaller01011.dll',
                         'redist\wdf\x86\winusbcoinstaller2.dll') {
            if (-not (Test-Path (Join-Path $wdk $f))) { throw "vendored WDK redist missing: $f" }
          }
          "WDK_DIR=$wdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/freejoyx-dfu

      - name: Build freejoyx-dfu helper (winusb-autobind)
        run: cargo build --release --features winusb-autobind --manifest-path tools/freejoyx-dfu/Cargo.toml

      - name: Verify autobind is compiled in
        shell: pwsh
        run: |
          # Can't reach a real DFU device on the runner, so "device not found" is
          # the expected PASS -- it proves the real bind path compiled in. Only
          # the stub string is a failure.
          $out = & tools\freejoyx-dfu\target\release\freejoyx-dfu.exe bind-winusb 2>&1 | Out-String
          Write-Host $out
          if ($out -match 'not built into this helper') {
            Write-Error "winusb-autobind feature is missing -- build produced the stub bind path"
            exit 1
          }

      - name: Package (app + Qt runtime)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          # qmake's SUBDIRS template Release build lands at src\release\.
          $exePath = "src\release\FreeJoyXConfiguratorQt.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "FreeJoyXConfiguratorQt.exe not found at $exePath"
            exit 1
          }
          Copy-Item $exePath dist\

          # Manual Qt deploy (windeployqt is unreliable on install-qt-action's
          # layout). Copy exactly what src.pro uses: Core/Gui/Network/Widgets/
          # Svg, the windows platform plugin, image-format plugins for SVG/PNG/
          # JPEG resources, the styles plugin, plus the MinGW runtime.
          $qtBin = "$env:QT_ROOT_DIR\bin"
          $qtPlug = "$env:QT_ROOT_DIR\plugins"

          foreach ($dll in 'Qt5Core.dll', 'Qt5Gui.dll', 'Qt5Network.dll', 'Qt5Widgets.dll', 'Qt5Svg.dll') {
            Copy-Item "$qtBin\$dll" dist\
          }

          New-Item -ItemType Directory -Path dist\platforms | Out-Null
          Copy-Item "$qtPlug\platforms\qwindows.dll" dist\platforms\

          New-Item -ItemType Directory -Path dist\imageformats | Out-Null
          foreach ($plug in 'qsvg.dll', 'qico.dll', 'qjpeg.dll') {
            if (Test-Path "$qtPlug\imageformats\$plug") {
              Copy-Item "$qtPlug\imageformats\$plug" dist\imageformats\
            }
          }

          New-Item -ItemType Directory -Path dist\styles | Out-Null
          if (Test-Path "$qtPlug\styles\qwindowsvistastyle.dll") {
            Copy-Item "$qtPlug\styles\qwindowsvistastyle.dll" dist\styles\
          }

          $mingwBin = "$env:IQTA_TOOLS\mingw810_64\bin"
          foreach ($dll in 'libgcc_s_seh-1.dll', 'libstdc++-6.dll', 'libwinpthread-1.dll') {
            if (Test-Path "$mingwBin\$dll") {
              Copy-Item "$mingwBin\$dll" dist\
            }
          }

          # OpenSSL 1.1 runtime so Qt5Network can negotiate TLS (HTTPS). Without
          # it the online firmware-release list (FirmwareLibrary -> GitHub API)
          # dies with "TLS initialization failed". Vendored in ci/openssl-redist/
          # (OpenSSL 1.1.1w x64) because Qt removed its tools_openssl_x64 package
          # and Qt 5.15.2 can't load OpenSSL 3.x -- see that dir's README.
          $sslDir = "ci\openssl-redist"
          foreach ($dll in 'libssl-1_1-x64.dll', 'libcrypto-1_1-x64.dll') {
            $src = Join-Path $sslDir $dll
            if (-not (Test-Path $src)) {
              Write-Error "Vendored OpenSSL DLL missing: $src"
              exit 1
            }
            Copy-Item $src dist\
          }

          # DFU install helper, built in-repo above (matched pair for this
          # commit -- no manual drop-in).
          $helper = "tools\freejoyx-dfu\target\release\freejoyx-dfu.exe"
          if (-not (Test-Path $helper)) {
            Write-Error "freejoyx-dfu.exe not found at $helper"
            exit 1
          }
          Copy-Item $helper dist\

          Write-Host "=== dist/ (app + Qt runtime) ==="
          Get-ChildItem -Recurse dist | Format-Table FullName, Length

      - name: Upload configurator (Windows) artifact
        uses: actions/upload-artifact@v7
        with:
          name: FreeJoyXConfiguratorQt-windows
          path: dist/**
          if-no-files-found: error
          retention-days: 30
